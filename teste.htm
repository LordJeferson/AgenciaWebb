<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<header>

    <style>
        body {
            background-color: aqua;
        }

        h1 {
            color: green;
            font-size: 100px;
            letter-spacing: 30px;
        }

        @media (max-width: 884px) {

            body {
                background-color: purple;
            }

            h1 {
                font-size: 30px;
                color: greenyellow;
            }
        }

        @media (max-width: 480) {

            body {
                background-color: yellow;
            }

            h1 {
                font-size: 10px;
                color: greenyellow;
                color: azure;
                color: blue;
            }
        }
    </style>

</header>


<body>
    <h1>Titulo</h1>
</body>

</html>
